name: Custom / Build ERPNext Image

on:
  workflow_dispatch:
    inputs:
      frappe_branch:
        description: Frappe branch used by build arg FRAPPE_BRANCH
        required: false
        default: version-16
        type: string
      image_tag:
        description: Docker tag for custom image
        required: false
        default: "16"
        type: string
      push:
        description: Push image to GHCR
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LOCAL_IMAGE: custom:${{ inputs.image_tag }}
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/erpnext-custom:${{ inputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:latest
          platforms: all

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build ERPNext image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/layered/Containerfile
          no-cache: true
          push: ${{ inputs.push }}
          load: ${{ inputs.push == false }}
          platforms: linux/amd64
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=${{ inputs.frappe_branch }}
          secrets: |
            id=apps_json,src=apps.json
          tags: |
            ${{ env.LOCAL_IMAGE }}
            ${{ env.GHCR_IMAGE }}
